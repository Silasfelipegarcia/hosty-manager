<h1>Novo imóvel</h1>
<mat-stepper linear>
  <mat-step [stepControl]="identity" label="Identidade">
    <form [formGroup]="identity">
      <mat-form-field appearance="outline" class="full"><mat-label>Nome</mat-label><input matInput formControlName="name" /></mat-form-field>
      <mat-form-field appearance="outline" class="full"><mat-label>Descrição</mat-label><textarea matInput rows="3" formControlName="description"></textarea></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Diária (R$)</mat-label><input matInput type="number" formControlName="nightlyRate" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Máx. hóspedes</mat-label><input matInput type="number" formControlName="maxGuests" /></mat-form-field>
      <button mat-button matStepperNext>Próximo</button>
    </form>
  </mat-step>
  <mat-step [stepControl]="address" label="Endereço">
    <form [formGroup]="address">
      <mat-form-field appearance="outline" class="full"><mat-label>Cidade</mat-label><input matInput formControlName="city" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Estado</mat-label><input matInput formControlName="state" /></mat-form-field>
      <mat-form-field appearance="outline" class="full"><mat-label>Bairro</mat-label><input matInput formControlName="neighborhood" /></mat-form-field>
      <mat-form-field appearance="outline" class="full"><mat-label>Rua</mat-label><input matInput formControlName="streetAddress" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Número</mat-label><input matInput formControlName="streetNumber" /></mat-form-field>
      <button mat-button matStepperPrevious>Voltar</button>
      <button mat-button matStepperNext>Próximo</button>
    </form>
  </mat-step>
  <mat-step [stepControl]="rules" label="Regras">
    <form [formGroup]="rules">
      <mat-checkbox formControlName="petsAllowed">Aceita pets</mat-checkbox>
      <mat-form-field appearance="outline"><mat-label>Máx. pets</mat-label><input matInput type="number" formControlName="maxPets" /></mat-form-field>
      <button mat-button matStepperPrevious>Voltar</button>
      <button mat-button matStepperNext>Próximo</button>
    </form>
  </mat-step>
  <mat-step [stepControl]="media" label="Mídia">
    <form [formGroup]="media">
      <app-property-media-editor
        [coverPhotoUrl]="mediaCover()"
        (coverPhotoUrlChange)="mediaCover.set($event)"
        [galleryPhotoUrls]="mediaGallery()"
        (galleryPhotoUrlsChange)="mediaGallery.set($event)"
      />
      <h3>Redes e site</h3>
      <mat-form-field appearance="outline" class="full"><mat-label>Instagram</mat-label><input matInput formControlName="instagramUrl" /></mat-form-field>
      <mat-form-field appearance="outline" class="full"><mat-label>Facebook</mat-label><input matInput formControlName="facebookUrl" /></mat-form-field>
      <mat-form-field appearance="outline" class="full">
        <mat-label>WhatsApp</mat-label>
        <input matInput formControlName="whatsappUrl" placeholder="11999998888" />
        <mat-hint>Número com DDD — salvamos como link do WhatsApp</mat-hint>
      </mat-form-field>
      <mat-form-field appearance="outline" class="full"><mat-label>Site</mat-label><input matInput formControlName="websiteUrl" /></mat-form-field>
      <button mat-button matStepperPrevious>Voltar</button>
      <button mat-button matStepperNext>Próximo</button>
    </form>
  </mat-step>
  <mat-step [stepControl]="publish" label="Publicação">
    <form [formGroup]="publish">
      <mat-form-field appearance="outline">
        <mat-label>Status operacional</mat-label>
        <mat-select formControlName="operationalStatus">
          <mat-option value="DRAFT">Rascunho</mat-option>
          <mat-option value="ACTIVE">Ativo</mat-option>
          <mat-option value="PAUSED">Pausado</mat-option>
        </mat-select>
      </mat-form-field>
      <div>
        <button mat-button matStepperPrevious>Voltar</button>
        <button mat-flat-button color="primary" (click)="submit()" [disabled]="saving()">Criar imóvel</button>
      </div>
    </form>
  </mat-step>
</mat-stepper>

<style>
  .full { width: 100%; display: block; }
  mat-form-field { margin-right: 12px; }
</style>
