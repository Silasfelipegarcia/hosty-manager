<div class="portal-page">
<div class="portal-page-header finance-hub-header">
  <div>
    <h1>{{ labels.finances }}</h1>
    <p class="portal-subtitle">Visão do mês, caixa e performance — tudo em um lugar</p>
  </div>
</div>

<app-finance-filter-bar [activeTab]="activeTab()" />

<mat-tab-group
  [selectedIndex]="tabIndex()"
  (selectedIndexChange)="onTabChange($event)"
  class="finance-tabs portal-tabs"
>
  <mat-tab [label]="labels.financeMonth">
    <div class="tab-body">
      <app-finance-page />
    </div>
  </mat-tab>
  <mat-tab [label]="labels.financeCash">
    <div class="tab-body">
      <app-financial-health-page />
    </div>
  </mat-tab>
  <mat-tab [label]="labels.financePerformance">
    <div class="tab-body">
      <app-property-crm-page />
    </div>
  </mat-tab>
</mat-tab-group>
</div>
