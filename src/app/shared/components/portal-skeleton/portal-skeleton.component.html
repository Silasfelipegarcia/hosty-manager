@switch (variant()) {
  @case ('kpis') {
    <div class="portal-skeleton-kpi-grid">
      @for (i of [1, 2, 3, 4, 5, 6]; track i) {
        <div class="portal-skeleton portal-skeleton-kpi"></div>
      }
    </div>
  }
  @case ('list') {
    @for (i of rowIndices(); track i) {
      <div class="portal-skeleton-row">
        <div class="portal-skeleton portal-skeleton-avatar"></div>
        <div class="portal-skeleton-lines">
          <div class="portal-skeleton portal-skeleton-line w-60"></div>
          <div class="portal-skeleton portal-skeleton-line w-40"></div>
        </div>
      </div>
    }
  }
  @case ('card') {
    <div class="portal-skeleton portal-skeleton-card"></div>
  }
  @default {
    <div class="portal-skeleton-kpi-grid">
      @for (i of [1, 2, 3, 4, 5, 6]; track i) {
        <div class="portal-skeleton portal-skeleton-kpi"></div>
      }
    </div>
    <div class="portal-skeleton-grid">
      <div class="portal-skeleton portal-skeleton-card"></div>
      <div class="portal-skeleton portal-skeleton-card"></div>
    </div>
  }
}
